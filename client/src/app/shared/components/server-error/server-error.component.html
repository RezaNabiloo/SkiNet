<div class="container mt-5 p-4 bg-gray-100 rounded shadow-lg">
    <h1 class="text-2xl font-semibold mb-4">Internal Server Error</h1>
    @if(error)
    {
    <h5 class="text-red-600">Error:{{error.message}}</h5>
    <p class="font-bold mb-2">This error comes from the server, not Angilar</p>
    <p clasmb-2>what to do next?</p>
    <ol class="list-decimal ml-5 mb-4">
        <li class="mb-1">Cjeck the network tab in chrome dev tools</li>
        <li class="mb-1">Reproduce the error in postman.
            If same error, don't waste time trubleshoting angular code</li>
    </ol>
    <h5 class="text-lg font-semibolld mb-2" Stack trace></h5>
    <mat-card class="p-4 bg-white">
        <code class="block whitespace-break-spaces">{{error?.details}}</code>
    </mat-card>

    }
</div>
